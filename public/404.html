<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suriix | سوريكس</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Cairo', sans-serif;
        background-color: #090714;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }
      .loader {
        border: 4px solid rgba(255, 255, 255, 0.1);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border-left-color: #7c3aed;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
        display: inline-block;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <script>
      // SPA redirect fallback
      // Storing the current path to handle it in client router if needed,
      // and redirecting to the main page.
      const currentPath = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem('redirect_path', currentPath);
      window.location.href = '/';
    </script>
  </head>
  <body>
    <div>
      <div class="loader"></div>
      <h2>جاري تحميل الصفحة...</h2>
    </div>
  </body>
</html>
